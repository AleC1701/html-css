<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        table {
            width: 50px;
            border-collapse: collapse;
            font-size: 2em;
            text-align: center;

        }

        td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Mesclagens de células</h1>
    <table>
        <tr>
            <td colspan="2">A</td>
            
            <td rowspan="2">C</td>
        </tr>

       <tr>
            
            <td>E</td>
            <td>F</td>
        </tr>

           <tr>
            <td colspan="2">G</td>
            <td>H</td>
            
       
    </table>
</body>
</html>
